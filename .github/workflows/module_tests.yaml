name: module_tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  module-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest
      - run: pytest tests/ -v --tb=short
